<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iloilo R6 Tigers Brigade MDT • LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap');
        body { font-family: 'Roboto Mono', monospace; }
        .nav-link { transition: all 0.2s; }
        .nav-link.active { background-color: #991b1b; border-left: 4px solid #f59e0b; }
        .live-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% {opacity:1} 50% {opacity:0.3} }
        .dispatch-entry, .chat-message { transition: all 0.3s; }
        #map { height: 620px; width: 100%; }
        .chat-container { height: 620px; }
        .chat-feed { height: calc(100% - 70px); overflow-y: auto; scrollbar-width: thin; }
        .chat-feed::-webkit-scrollbar { width: 6px; }
        .chat-feed::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 3px; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden">
    <!-- Header -->
    <header class="bg-red-950 border-b-4 border-orange-500 py-3 px-6 flex items-center justify-between shadow-lg">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-4xl border-4 border-orange-500">🐅</div>
            <div>
                <h1 class="text-2xl font-bold text-orange-400">ILOILO R6 TIGERS</h1>
                <p class="text-xs text-red-200">SEARCH & RESCUE BRIGADE • LIVE MDT</p>
            </div>
        </div>
        <div class="text-center font-mono">
            <div id="current-date" class="text-lg"></div>
            <div id="current-time" class="text-sm text-orange-300"></div>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 text-green-400">
                <div class="w-3 h-3 bg-green-400 rounded-full live-dot"></div>
                <span id="sync-status" class="text-sm font-bold">SYNCING...</span>
            </div>
            <button onclick="logout()" class="bg-red-700 hover:bg-red-800 px-5 py-2 rounded-lg font-bold">LOGOUT</button>
        </div>
    </header>

    <div class="flex h-[calc(100vh-73px)]">
        <!-- Sidebar -->
        <div class="w-72 bg-zinc-900 border-r border-red-800 p-3 flex flex-col">
            <nav class="flex-1 space-y-1">
                <a href="#" onclick="switchPanel(0)" class="nav-link active flex items-center gap-3 px-5 py-3 rounded-xl text-sm">📊 DASHBOARD</a>
                <a href="#" onclick="switchPanel(1)" class="nav-link flex items-center gap-3 px-5 py-3 rounded-xl text-sm">👥 PERSONNEL</a>
                <a href="#" onclick="switchPanel(2)" class="nav-link flex items-center gap-3 px-5 py-3 rounded-xl text-sm">🚨 LIVE DISPATCH</a>
                <a href="#" onclick="switchPanel(3)" class="nav-link flex items-center gap-3 px-5 py-3 rounded-xl text-sm">🗺️ VIEW MAP</a>
                <a href="#" onclick="switchPanel(4)" class="nav-link flex items-center gap-3 px-5 py-3 rounded-xl text-sm">💬 GROUP CHAT</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-6 overflow-auto" id="main-content">
            <!-- Dashboard -->
            <div id="panel-0">
                <div class="text-center py-20">
                    <h1 class="text-5xl font-bold text-orange-400 mb-4">Welcome to MDT</h1>
                    <p class="text-xl text-zinc-400">Wait For Calls • All units Standby</p>
                </div>
            </div>

            <!-- Personnel -->
            <div id="panel-1" class="hidden">
                <h2 class="text-2xl font-bold mb-6">PERSONNEL</h2>
                <div class="bg-zinc-900 p-6 rounded-3xl mb-6">
                    <div class="flex gap-3">
                        <input id="new-personnel-name" placeholder="Enter name (e.g. TR-07 Santos)" 
                               class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
                        <button onclick="addPersonnel()" class="bg-orange-500 hover:bg-orange-600 text-black font-bold px-8 rounded-2xl">ADD</button>
                    </div>
                </div>
                <div id="personnel-list" class="space-y-3"></div>
            </div>

            <!-- Live Dispatch -->
            <div id="panel-2" class="hidden">
                <div class="flex justify-between mb-6">
                    <h2 class="text-2xl font-bold">LIVE DISPATCH</h2>
                    <button onclick="newDispatchCall()" class="bg-orange-500 hover:bg-orange-600 text-black px-6 py-3 rounded-2xl font-bold flex items-center gap-2">
                        <i class="fas fa-plus"></i> NEW CALL
                    </button>
                </div>
                <div id="dispatch-feed" class="space-y-4"></div>
            </div>

            <!-- Map -->
            <div id="panel-3" class="hidden">
                <h2 class="text-2xl font-bold mb-6">OPERATIONS MAP</h2>
                <div id="map" class="rounded-3xl overflow-hidden border border-orange-500"></div>
            </div>

            <!-- Chat -->
            <div id="panel-4" class="hidden">
                <div class="flex justify-between mb-6">
                    <h2 class="text-2xl font-bold">GROUP CHAT • BRIGADE</h2>
                    <div class="text-xs text-green-400 flex items-center gap-2">
                        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                        LIVE
                    </div>
                </div>
                <div class="chat-container bg-zinc-900 rounded-3xl border border-orange-500/30 flex flex-col">
                    <div id="chat-feed" class="chat-feed p-6 space-y-4 flex-1"></div>
                    <div class="p-4 border-t border-zinc-700 flex gap-3">
                        <input id="chat-input" 
                               onkeypress="if(event.key === 'Enter') sendChatMessage()"
                               placeholder="Type message... (Press Enter to send)" 
                               class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-orange-500">
                        <button onclick="sendChatMessage()" 
                                class="bg-orange-500 hover:bg-orange-600 text-black font-bold px-8 rounded-2xl">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New Dispatch Modal -->
    <div id="new-dispatch-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-zinc-900 w-full max-w-lg mx-4 p-8 rounded-3xl">
            <h3 class="text-xl font-bold mb-6">New SAR Dispatch Call</h3>
            <select id="incident-type" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4 text-white">
                <option>Flood Rescue</option>
                <option>Missing Person</option>
                <option>Vehicular accident</option>
                <option>Residents Evacuation</option>
                <option>Fire</option>
                <option>Drowning</option>
            </select>
            <input id="incident-location" placeholder="Location (e.g. Benedicto, Jaro, Iloilo)" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4 text-white">
            <textarea id="incident-desc" placeholder="Details / Notes..." rows="3" class="w-full bg-zinc-800 p-4 rounded-2xl text-white"></textarea>
            
            <div class="flex gap-4 mt-8">
                <button onclick="closeModal()" class="flex-1 py-4 border border-zinc-600 rounded-2xl hover:bg-zinc-800">Cancel</button>
                <button onclick="submitNewDispatch()" class="flex-1 py-4 bg-orange-500 text-black font-bold rounded-2xl">BROADCAST + ALARM</button>
            </div>
        </div>
    </div>

    <script>
        const BIN_ID = "6a36bc57f5f4af5e2914e1a3";
        const MASTER_KEY = "$2a$10$pedxS/u0iYwkNSqCta30R.iC6uYafEmeMR9br.X6X6e9MKPBNdrru";
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let dispatches = [];
        let personnel = [];
        let messages = [];
        let audioContext;
        let map;
        let lastMessageCount = 0;

        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playDispatchAlarm() {
            if (!audioContext) initAudio();
            let delay = 0;
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.value = 680;
                    gain.gain.value = 0.35;
                    osc.connect(gain).connect(audioContext.destination);
                    osc.start();
                    setTimeout(() => osc.stop(), 550);
                }, delay);
                delay += 850;
            }
        }

        async function fetchData() {
            try {
                const res = await axios.get(API_URL, { headers: { "X-Master-Key": MASTER_KEY } });
                const record = res.data.record || {};
                dispatches = record.dispatches || [];
                personnel = record.personnel || [];
                messages = record.messages || [];
                
                document.getElementById('sync-status').textContent = "LIVE ✓";
                renderAll();
                
                // New message notification
                if (messages.length > lastMessageCount && document.getElementById('panel-4').classList.contains('hidden') === false) {
                    // Optional subtle sound for new chat message
                }
                lastMessageCount = messages.length;
            } catch (e) {
                document.getElementById('sync-status').textContent = "OFFLINE";
            }
        }

        async function updateData() {
            try {
                await axios.put(API_URL, { 
                    dispatches, 
                    personnel, 
                    messages,
                    lastUpdated: new Date().toISOString() 
                }, {
                    headers: { "X-Master-Key": MASTER_KEY, "Content-Type": "application/json" }
                });
                renderAll();
            } catch (e) { console.error(e); }
        }

        function renderAll() {
            renderDispatchFeed();
            renderPersonnelList();
            renderChatFeed();
        }

        function renderDispatchFeed() {
            const container = document.getElementById('dispatch-feed');
            if (dispatches.length === 0) {
                container.innerHTML = `<p class="text-center text-zinc-400 py-12">No active calls. All units on standby.</p>`;
                return;
            }
            container.innerHTML = dispatches.map(d => `
                <div class="dispatch-entry bg-zinc-900 border border-red-800 rounded-3xl p-6 flex gap-6">
                    <div class="text-center w-24">
                        <div class="text-orange-400">${d.time}</div>
                        <div class="text-red-400 font-bold">${d.priority || 'HIGH'}</div>
                    </div>
                    <div class="flex-1">
                        <div class="font-bold">${d.type}</div>
                        <div class="text-zinc-400">${d.location}</div>
                        <div class="text-sm mt-2 text-orange-300">
                            Unit: <span class="font-mono">${d.unit || 'FD-UNIT'}</span> • 
                            <span class="text-green-400">${d.status || 'ON-GOING'}</span>
                        </div>
                    </div>
                    <button onclick="closeCall('${d.id}')" class="self-start px-6 py-3 bg-red-700 hover:bg-red-600 rounded-2xl text-sm">CLOSE</button>
                </div>
            `).join('');
        }

        function renderPersonnelList() {
            const container = document.getElementById('personnel-list');
            container.innerHTML = personnel.map(p => `
                <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6 flex items-center gap-4">
                    <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center text-2xl">👤</div>
                    <div class="flex-1"><div class="font-bold">${p.name}</div><div class="text-xs text-green-400">ON DUTY</div></div>
                    <button onclick="removePersonnel('${p.id}')" class="text-red-400 hover:text-red-500">REMOVE</button>
                </div>
            `).join('') || '<p class="text-zinc-400">No personnel added yet.</p>';
        }

        function renderChatFeed() {
            const container = document.getElementById('chat-feed');
            if (messages.length === 0) {
                container.innerHTML = `<div class="h-full flex items-center justify-center text-zinc-500">No messages yet. Say something...</div>`;
                return;
            }
            container.innerHTML = messages.map(m => `
                <div class="chat-message flex gap-3 ${m.isSelf ? 'justify-end' : ''}">
                    <div class="${m.isSelf ? 'bg-orange-600 text-right' : 'bg-zinc-800'} rounded-3xl px-5 py-3 max-w-[75%]">
                        <div class="text-xs text-orange-400 mb-1">${m.sender} • ${m.time}</div>
                        <div>${m.text}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function addPersonnel() {
            const input = document.getElementById('new-personnel-name');
            const name = input.value.trim();
            if (!name) return;
            personnel.unshift({ id: Date.now().toString(), name: name });
            await updateData();
            input.value = '';
        }

        async function removePersonnel(id) {
            if (confirm("Remove this personnel?")) {
                personnel = personnel.filter(p => p.id !== id);
                await updateData();
            }
        }

        async function submitNewDispatch() {
            const type = document.getElementById('incident-type').value;
            const loc = document.getElementById('incident-location').value.trim() || "Unknown Location";

            dispatches.unshift({
                id: Date.now().toString(),
                time: new Date().toLocaleTimeString('en-PH', {hour:'2-digit', minute:'2-digit'}),
                type: type,
                location: loc,
                unit: "FD-UNIT",
                status: "ON-GOING",
                priority: "HIGH"
            });

            await updateData();
            playDispatchAlarm();
            closeModal();
        }

        function closeCall(id) {
            if (confirm("Mark this call as resolved?")) {
                dispatches = dispatches.filter(d => d.id !== id);
                updateData();
            }
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            const now = new Date();
            messages.unshift({
                id: Date.now().toString(),
                sender: "You (MDT)", 
                time: now.toLocaleTimeString('en-PH', {hour:'2-digit', minute:'2-digit'}),
                text: text,
                isSelf: true
            });

            input.value = '';
            await updateData();
        }

        function newDispatchCall() { 
            document.getElementById('new-dispatch-modal').classList.remove('hidden'); 
        }
        
        function closeModal() { 
            document.getElementById('new-dispatch-modal').classList.add('hidden'); 
        }

        function initMap() {
            if (map) return;
            map = L.map('map').setView([10.7202, 122.5621], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function switchPanel(n) {
            document.querySelectorAll('#main-content > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(`panel-${n}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.querySelectorAll('.nav-link')[n].classList.add('active');
            
            if (n === 3) initMap();
            if (n === 4) {
                setTimeout(() => {
                    const feed = document.getElementById('chat-feed');
                    if (feed) feed.scrollTop = feed.scrollHeight;
                }, 100);
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('current-date').textContent = now.toLocaleDateString('en-PH');
            document.getElementById('current-time').textContent = now.toLocaleTimeString('en-PH', {hour:'2-digit', minute:'2-digit'});
        }

        function logout() {
            if (confirm("End MDT session?")) location.reload();
        }

        // Initialize
        window.onload = () => {
            updateClock();
            setInterval(updateClock, 1000);
            initAudio();
            fetchData();
            setInterval(fetchData, 1500); // Faster sync for chat
        };
    </script>
</body>
    </html>
