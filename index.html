<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iloilo R6 Tigers Brigade MDT • LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap');
        body { font-family: 'Roboto Mono', monospace; }
        .nav-link.active { background-color: #991b1b; border-left: 4px solid #f59e0b; }
        .live-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% {opacity:1} 50% {opacity:0.3} }
        .dispatch-entry { transition: all 0.3s; }
        #map { height: 600px; width: 100%; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden">
    <!-- Header -->
    <header class="bg-red-950 border-b-4 border-orange-500 py-3 px-6 flex items-center justify-between shadow-lg">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-4xl border-4 border-orange-500">🐅</div>
            <div>
                <h1 class="text-2xl font-bold text-orange-400">ILOILO R6 TIGERS</h1>
                <p class="text-xs text-red-200">SEARCH & RESCUE BRIGADE • <span class="text-green-400">LIVE SYNC</span></p>
            </div>
        </div>
        <div class="text-center font-mono">
            <div id="current-date" class="text-lg"></div>
            <div id="current-time" class="text-sm text-orange-300"></div>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 text-green-400">
                <div class="w-3 h-3 bg-green-400 rounded-full live-dot"></div>
                <span id="sync-status" class="text-sm font-bold">SYNCING...</span>
            </div>
            <button onclick="logout()" class="bg-red-700 hover:bg-red-800 px-5 py-2 rounded-lg font-bold">LOGOUT</button>
        </div>
    </header>

    <div class="flex h-[calc(100vh-73px)]">
        <!-- Sidebar -->
        <div class="w-72 bg-zinc-900 border-r border-red-800 p-3 flex flex-col">
            <nav class="flex-1 space-y-1">
                <a href="#" onclick="switchPanel(0)" class="nav-link active flex items-center gap-3 px-5 py-3 rounded-xl">📊 DASHBOARD</a>
                <a href="#" onclick="switchPanel(1)" class="nav-link flex items-center gap-3 px-5 py-3 rounded-xl">👥 PERSONNEL</a>
                <a href="#" onclick="switchPanel(2)" class="nav-link flex items-center gap-3 px-5 py-3 rounded-xl">🚨 LIVE DISPATCH</a>
                <a href="#" onclick="switchPanel(3)" class="nav-link flex items-center gap-3 px-5 py-3 rounded-xl">🗺️ VIEW MAP</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-6 overflow-auto" id="main-content">
            <div id="panel-0"> <!-- Dashboard --> 
                <div class="text-center py-20">
                    <h1 class="text-5xl font-bold text-orange-400 mb-4">Welcome to MDT</h1>
                    <p class="text-xl text-zinc-400">No active calls • All units standby</p>
                </div>
            </div>

            <div id="panel-1" class="hidden"> <!-- Personnel --> 
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-3"><i class="fas fa-users"></i> PERSONNEL</h2>
                <div class="bg-zinc-900 p-6 rounded-3xl mb-6">
                    <div class="flex gap-3">
                        <input id="new-personnel-name" placeholder="Enter name (e.g. TR-07 Santos)" 
                               class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                        <button onclick="addPersonnel()" class="bg-orange-500 hover:bg-orange-600 text-black font-bold px-8 rounded-2xl">ADD</button>
                    </div>
                </div>
                <div id="personnel-list" class="space-y-3"></div>
            </div>

            <div id="panel-2" class="hidden"> <!-- Dispatch -->
                <div class="flex justify-between mb-6">
                    <h2 class="text-2xl font-bold flex items-center gap-2"><i class="fas fa-bell text-orange-400"></i> LIVE DISPATCH</h2>
                    <button onclick="newDispatchCall()" class="bg-orange-500 hover:bg-orange-600 text-black px-6 py-3 rounded-2xl font-bold flex items-center gap-2">
                        <i class="fas fa-plus"></i> NEW CALL
                    </button>
                </div>
                <div id="dispatch-feed" class="space-y-4 min-h-[400px]"></div>
            </div>

            <div id="panel-3" class="hidden"> <!-- Map -->
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-3"><i class="fas fa-map-marked-alt"></i> OPERATIONS MAP</h2>
                <div id="map" class="rounded-3xl overflow-hidden border border-orange-500"></div>
            </div>
        </div>
    </div>

    <!-- New Dispatch Modal -->
    <div id="new-dispatch-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-zinc-900 w-full max-w-lg mx-4 p-8 rounded-3xl">
            <h3 class="text-xl font-bold mb-6">New SAR Dispatch Call</h3>
            <select id="incident-type" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4">
                <option>Flood Rescue</option>
                <option>Missing Person</option>
                <option>Typhoon Response</option>
                <option>Medical Evacuation</option>
                <option>Vehicle Rescue</option>
            </select>
            <input id="incident-location" placeholder="Location (Barangay / Area)" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4">
            <textarea id="incident-desc" placeholder="Details / Notes..." rows="3" class="w-full bg-zinc-800 p-4 rounded-2xl"></textarea>
            
            <div class="flex gap-4 mt-8">
                <button onclick="closeModal()" class="flex-1 py-4 border border-zinc-600 rounded-2xl hover:bg-zinc-800">Cancel</button>
                <button onclick="submitNewDispatch()" class="flex-1 py-4 bg-orange-500 text-black font-bold rounded-2xl">BROADCAST + ALARM</button>
            </div>
        </div>
    </div>

    <script>
        // ================== JSONBIN CONFIG ==================
        const BIN_ID = "6a36bc57f5f4af5e2914e1a3";
        const MASTER_KEY = "$2a$10$pedxS/u0iYwkNSqCta30R.iC6uYafEmeMR9br.X6X6e9MKPBNdrru";
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let dispatches = [];
        let personnel = [];
        let audioContext;

        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        // Realistic FD Dispatch Tone
        function playDispatchAlarm() {
            if (!audioContext) initAudio();
            
            const times = 4; // Repeat tone 4 times
            let delay = 0;
            
            for (let i = 0; i < times; i++) {
                setTimeout(() => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(650, audioContext.currentTime);
                    gain.gain.value = 0.4;
                    
                    osc.connect(gain).connect(audioContext.destination);
                    osc.start();
                    
                    setTimeout(() => {
                        gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.8);
                        osc.stop(audioContext.currentTime + 1);
                    }, 600);
                }, delay);
                delay += 900;
            }
        }

        // Rest of the functions (fetchData, updateData, render, etc.)
        async function fetchData() {
            try {
                const res = await axios.get(API_URL, { headers: { "X-Master-Key": MASTER_KEY } });
                const record = res.data.record || {};
                dispatches = record.dispatches || [];
                personnel = record.personnel || [];
                document.getElementById('sync-status').textContent = "LIVE ✓";
                renderAll();
            } catch (e) {
                document.getElementById('sync-status').textContent = "OFFLINE";
            }
        }

        async function updateData() {
            try {
                await axios.put(API_URL, { dispatches, personnel, lastUpdated: new Date().toISOString() }, {
                    headers: { "X-Master-Key": MASTER_KEY, "Content-Type": "application/json" }
                });
                renderAll();
            } catch (e) { console.error(e); }
        }

        function renderAll() {
            renderDispatchFeed();
            renderPersonnelList();
        }

        function renderDispatchFeed() {
            const container = document.getElementById('dispatch-feed');
            if (dispatches.length === 0) {
                container.innerHTML = `<p class="text-center text-zinc-400 py-12">No active calls. All units on standby.</p>`;
                return;
            }
            container.innerHTML = dispatches.map(d => `
                <div class="dispatch-entry bg-zinc-900 border border-red-800 rounded-3xl p-6 flex gap-6">
                    <div class="text-center w-24">
                        <div class="text-orange-400">${d.time}</div>
                        <div class="text-red-400 font-bold">${d.priority}</div>
                    </div>
                    <div class="flex-1">
                        <div class="font-bold">${d.type}</div>
                        <div class="text-zinc-400">${d.location}</div>
                        <div class="text-sm mt-1">Unit: \( {d.unit} • <span class="text-green-400"> \){d.status}</span></div>
                    </div>
                    <button onclick="closeCall('${d.id}')" class="self-start px-6 py-3 bg-red-700 hover:bg-red-600 rounded-2xl text-sm">CLOSE</button>
                </div>
            `).join('');
        }

        function renderPersonnelList() {
            const container = document.getElementById('personnel-list');
            container.innerHTML = personnel.map(p => `
                <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6 flex items-center gap-4">
                    <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center text-2xl">👤</div>
                    <div class="flex-1"><div class="font-bold">${p.name}</div><div class="text-xs text-green-400">ON DUTY</div></div>
                    <button onclick="removePersonnel('${p.id}')" class="text-red-400 hover:text-red-500">REMOVE</button>
                </div>
            `).join('') || '<p class="text-zinc-400">No personnel added yet.</p>';
        }

        async function addPersonnel() {
            const name = document.getElementById('new-personnel-name').value.trim();
            if (!name) return;
            personnel.unshift({ id: Date.now().toString(), name });
            await updateData();
            document.getElementById('new-personnel-name').value = '';
        }

        async function removePersonnel(id) {
            if (confirm("Remove?")) {
                personnel = personnel.filter(p => p.id !== id);
                await updateData();
            }
        }

        async function submitNewDispatch() {
            const type = document.getElementById('incident-type').value;
            const loc = document.getElementById('incident-location').value || "Unknown Location";

            dispatches.unshift({
                id: Date.now().toString(),
                time: new Date().toLocaleTimeString('en-PH', {hour:'2-digit', minute:'2-digit'}),
                type: type,
                location: loc,
                unit: "PENDING",
                status: "ON GOING",
                priority: "HIGH"
            });

            await updateData();
            playDispatchAlarm();   // ← Fire Department Tone
            closeModal();
        }

        function closeCall(id) {
            if (confirm("Mark as resolved?")) {
                dispatches = dispatches.filter(d => d.id !== id);
                updateData();
            }
        }

        function newDispatchCall() { document.getElementById('new-dispatch-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('new-dispatch-modal').classList.add('hidden'); }

        let map;
        function initMap() {
            map = L.map('map').setView([10.7202, 122.5621], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker([10.7202, 122.5621]).addTo(map).bindPopup('Iloilo Command Center').openPopup();
        }

        function switchPanel(n) {
            document.querySelectorAll('#main-content > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(`panel-${n}`).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.querySelectorAll('.nav-link')[n].classList.add('active');
            if (n === 3 && !map) initMap();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('current-date').textContent = now.toLocaleDateString('en-PH');
            document.getElementById('current-time').textContent = now.toLocaleTimeString('en-PH', {hour:'2-digit', minute:'2-digit'});
        }

        function logout() {
            if (confirm("End session?")) location.reload();
        }

        // Initialize
        window.onload = () => {
            updateClock();
            setInterval(updateClock, 1000);
            initAudio();
            fetchData();
            setInterval(fetchData, 2500);
        };
    </script>
</body>
</html>
