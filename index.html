<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iloilo R6 Tigers Brigade MDT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap');
        body { font-family: 'Roboto Mono', monospace; }
        .nav-link.active { background-color: #991b1b; border-left: 4px solid #f59e0b; }
        .live-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% {opacity:1} 50% {opacity:0.3} }
        .panel { display: none; }
        .panel.active { display: block; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden">

    <!-- Header -->
    <header class="bg-red-950 border-b-4 border-orange-500 py-3 px-6 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-4xl border-4 border-orange-500">🐅</div>
            <div>
                <h1 class="text-2xl font-bold text-orange-400">ILOILO R6 TIGERS</h1>
                <p class="text-xs text-red-200">SEARCH & RESCUE BRIGADE MDT</p>
            </div>
        </div>
        <div class="text-center font-mono">
            <div id="current-date" class="text-lg"></div>
            <div id="current-time" class="text-sm text-orange-300"></div>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 text-green-400">
                <div class="w-3 h-3 bg-green-400 rounded-full live-dot"></div>
                <span id="sync-status" class="text-sm font-bold">LIVE SYNC</span>
            </div>
            <button onclick="logout()" class="bg-red-700 hover:bg-red-800 px-5 py-2 rounded-lg font-bold">LOGOUT</button>
        </div>
    </header>

    <div class="flex h-[calc(100vh-73px)]">
        <!-- Sidebar -->
        <div class="w-72 bg-zinc-900 border-r border-red-800 p-3 flex flex-col">
            <nav class="flex-1 space-y-1">
                <a href="#" onclick="switchPanel(0)" class="nav-link active flex items-center gap-3 px-5 py-3 rounded-xl">📊 DASHBOARD</a>
                <a href="#" onclick="switchPanel(1)" class="nav-link flex items-center gap-3 px-5 py-3 rounded-xl">👥 PERSONNEL</a>
                <a href="#" onclick="switchPanel(2)" class="nav-link flex items-center gap-3 px-5 py-3 rounded-xl">🚨 LIVE DISPATCH</a>
                <a href="#" onclick="switchPanel(3)" class="nav-link flex items-center gap-3 px-5 py-3 rounded-xl">🚑 UNIT STATUS</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-6 overflow-auto" id="main-content">
            <!-- Dashboard -->
            <div id="panel-0" class="panel active">
                <div class="text-center py-20">
                    <h1 class="text-5xl font-bold text-orange-400">Welcome to MDT</h1>
                    <p class="text-xl text-zinc-400 mt-4">All systems ready</p>
                </div>
            </div>

            <!-- Personnel -->
            <div id="panel-1" class="panel hidden">
                <h2 class="text-2xl font-bold mb-6">Personnel Management</h2>
                <div class="bg-zinc-900 p-6 rounded-3xl mb-6">
                    <div class="flex gap-3">
                        <input id="new-personnel-name" placeholder="Enter name (e.g. TR-07 Santos)" 
                               class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                        <button onclick="addPersonnel()" class="bg-orange-500 hover:bg-orange-600 text-black font-bold px-8 rounded-2xl">ADD</button>
                    </div>
                </div>
                <div id="personnel-list" class="space-y-3"></div>
            </div>

            <!-- Live Dispatch -->
            <div id="panel-2" class="panel hidden">
                <div class="flex justify-between mb-6">
                    <h2 class="text-2xl font-bold">Live Dispatch</h2>
                    <button onclick="newDispatchCall()" class="bg-orange-500 hover:bg-orange-600 text-black px-6 py-3 rounded-2xl font-bold">+ NEW CALL</button>
                </div>
                <div id="dispatch-feed" class="space-y-4"></div>
            </div>

            <!-- Unit Status -->
            <div id="panel-3" class="panel hidden">
                <h2 class="text-2xl font-bold mb-6">Unit Status Tracking</h2>
                <div id="units-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- New Dispatch Modal -->
    <div id="new-dispatch-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-zinc-900 w-full max-w-lg mx-4 p-8 rounded-3xl">
            <h3 class="text-xl font-bold mb-6">New SAR Dispatch</h3>
            <select id="incident-type" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4">
                <option>Flood Rescue</option>
                <option>Missing Person</option>
                <option>Typhoon Response</option>
                <option>Medical Evacuation</option>
            </select>
            <input id="incident-location" placeholder="Location (Barangay)" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4">
            <textarea id="incident-desc" placeholder="Details..." rows="3" class="w-full bg-zinc-800 p-4 rounded-2xl"></textarea>
            <div class="flex gap-4 mt-8">
                <button onclick="closeModal()" class="flex-1 py-4 border border-zinc-600 rounded-2xl">Cancel</button>
                <button onclick="submitNewDispatch()" class="flex-1 py-4 bg-orange-500 text-black font-bold rounded-2xl">SEND + ALARM</button>
            </div>
        </div>
    </div>

    <script>
        const BIN_ID = "6a36bc57f5f4af5e2914e1a3";
        const MASTER_KEY = "$2a$10$pedxS/u0iYwkNSqCta30R.iC6uYafEmeMR9br.X6X6e9MKPBNdrru";
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let dispatches = [], personnel = [], units = [
            {id:"TR-01", name:"Tiger 1", status:"standby", location:"HQ"},
            {id:"TR-07", name:"Tiger 7", status:"standby", location:"HQ"}
        ];

        let audioContext;

        function initAudio() { audioContext = new (window.AudioContext || window.webkitAudioContext)(); }

        function playDispatchAlarm() {
            if (!audioContext) initAudio();
            let delay = 0;
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.value = 680;
                    gain.gain.value = 0.35;
                    osc.connect(gain).connect(audioContext.destination);
                    osc.start();
                    setTimeout(() => osc.stop(), 550);
                }, delay);
                delay += 850;
            }
        }

        async function fetchData() {
            try {
                const res = await axios.get(API_URL, { headers: { "X-Master-Key": MASTER_KEY } });
                const r = res.data.record || {};
                dispatches = r.dispatches || [];
                personnel = r.personnel || [];
                if (r.units) units = r.units;
                renderAll();
                document.getElementById('sync-status').textContent = "LIVE ✓";
            } catch (e) { document.getElementById('sync-status').textContent = "OFFLINE"; }
        }

        async function saveData() {
            await axios.put(API_URL, {dispatches, personnel, units}, {
                headers: {"X-Master-Key": MASTER_KEY, "Content-Type": "application/json"}
            });
            renderAll();
        }

        function renderAll() {
            renderDispatch();
            renderPersonnel();
            renderUnits();
        }

        function renderDispatch() {
            const c = document.getElementById('dispatch-feed');
            c.innerHTML = dispatches.length ? dispatches.map(d => `
                <div class="bg-zinc-900 border border-red-800 rounded-3xl p-6 mb-4">
                    <div class="font-bold">${d.type}</div>
                    <div class="text-zinc-400">${d.location}</div>
                    <button onclick="closeCall('${d.id}')" class="mt-4 px-6 py-2 bg-red-700 hover:bg-red-600 rounded-xl">CLOSE CALL</button>
                </div>
            `).join('') : `<p class="text-center text-zinc-400 py-12">No active calls. All units standby.</p>`;
        }

        function renderPersonnel() {
            const c = document.getElementById('personnel-list');
            c.innerHTML = personnel.map(p => `
                <div class="bg-zinc-900 p-6 rounded-3xl flex justify-between items-center">
                    <span class="font-bold">${p.name}</span>
                    <button onclick="removePersonnel('${p.id}')" class="text-red-400 hover:text-red-500">Remove</button>
                </div>
            `).join('') || '<p class="text-zinc-400">No personnel yet. Add some above.</p>';
        }

        function renderUnits() {
            const c = document.getElementById('units-list');
            c.innerHTML = units.map(u => `
                <div class="bg-zinc-900 p-6 rounded-3xl">
                    <div class="flex justify-between items-center">
                        <div><strong>${u.id}</strong> - ${u.name}</div>
                        <span class="px-4 py-1 rounded-full \( {u.status==='standby' ? 'bg-green-600' : 'bg-red-600'}"> \){u.status.toUpperCase()}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <button onclick="updateUnit('${u.id}','standby')" class="py-3 bg-green-900 hover:bg-green-800 rounded-2xl text-sm">STANDBY</button>
                        <button onclick="updateUnit('${u.id}','onscene')" class="py-3 bg-red-900 hover:bg-red-800 rounded-2xl text-sm">ON SCENE</button>
                    </div>
                </div>
            `).join('');
        }

        async function updateUnit(id, status) {
            const unit = units.find(u => u.id === id);
            if (unit) {
                unit.status = status;
                await saveData();
            }
        }

        async function addPersonnel() {
            const name = document.getElementById('new-personnel-name').value.trim();
            if (name) {
                personnel.unshift({id: Date.now().toString(), name});
                await saveData();
                document.getElementById('new-personnel-name').value = '';
            }
        }

        async function submitNewDispatch() {
            const type = document.getElementById('incident-type').value;
            const loc = document.getElementById('incident-location').value || "Unknown Location";
            dispatches.unshift({id: Date.now().toString(), type, location: loc});
            await saveData();
            playDispatchAlarm();
            closeModal();
        }

        function closeCall(id) {
            if (confirm("Close this call?")) {
                dispatches = dispatches.filter(d => d.id !== id);
                saveData();
            }
        }

        function removePersonnel(id) {
            if (confirm("Remove this personnel?")) {
                personnel = personnel.filter(p => p.id !== id);
                saveData();
            }
        }

        function newDispatchCall() { document.getElementById('new-dispatch-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('new-dispatch-modal').classList.add('hidden'); }

        function switchPanel(n) {
            document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
            document.getElementById(`panel-${n}`).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.querySelectorAll('.nav-link')[n].classList.add('active');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('current-date').textContent = now.toLocaleDateString('en-PH');
            document.getElementById('current-time').textContent = now.toLocaleTimeString('en-PH', {hour:'2-digit', minute:'2-digit'});
        }

        function logout() {
            if (confirm("End MDT session?")) location.reload();
        }

        // Initialize
        window.onload = () => {
            updateClock();
            setInterval(updateClock, 1000);
            initAudio();
            fetchData();
            setInterval(fetchData, 2000);
        };

        // Make functions global
        window.switchPanel = switchPanel;
        window.addPersonnel = addPersonnel;
        window.newDispatchCall = newDispatchCall;
        window.closeModal = closeModal;
        window.submitNewDispatch = submitNewDispatch;
        window.closeCall = closeCall;
        window.removePersonnel = removePersonnel;
        window.updateUnit = updateUnit;
        window.logout = logout;
    </script>
</body>
</html>
